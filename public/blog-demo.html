<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NBLB Blog Embed — demo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; color: #111; }
    header, footer { background: #0d1f3c; color: #fff; padding: 1rem 1.5rem; }
    header h1 { margin: 0; font-size: 1.1rem; }
    .note { max-width: 1080px; margin: 1rem auto; padding: 0 1rem; color: #555; font-size: .9rem; }
  </style>
</head>
<body>
  <!-- This simulates the client's own page header/nav -->
  <header><h1>Demo Site — this header/nav belongs to the host page</h1></header>

  <p class="note">
    Everything below the line is rendered by blog.js. Click a post to open it
    (URL changes to ?post=slug), use the browser Back button, and try the tag filter.
  </p>
  <hr>

  <!-- The two lines a client pastes onto their /blog page -->
  <div id="nblb-blog"></div>
  <script
    src="https://www.nobrandleftbehind.com/blog.js"
    data-tenant="designsonprint"
    data-page-size="6"></script>

  <hr>
  <footer>Demo Site — host page footer</footer>
</body>
</html>
